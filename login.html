<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - DOVI S.A.S.</title>
  <link href="public/assets/img/favicon-64.png" rel="icon">
 
  <link href="public/assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="public/assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
  <link href="public/assets/css/main.css" rel="stylesheet">

</head>
<body class="login-bg d-flex flex-column justify-content-between">

  
  <header class="p-3">
    <div class="container-fluid d-flex justify-content-between align-items-center">

      <a href="index.html" class="d-flex align-items-center text-decoration-none text-white fs-4 fw-bold">
        <img src="public/assets/img/logo_transparente.png" alt="Logo" class="me-2 logo-img">
        DOVI S.A.S.<span class="text-orange">.</span>
      </a>
      <a href="index.html" class="text-white-50 text-decoration-none small"><i class="bi bi-house-door-fill"></i> Volver al Inicio</a>
    </div>
  </header>


  <main class="container my-auto">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-4">
        

        <div class="text-center mb-4">
          <h2 class="fw-bold text-white">Iniciar Sesión</h2>
          <div class="linea-decorativa"></div>
        </div>

        <form action="#" method="POST">
          
          <div class="mb-3">
            <label for="email" class="form-label small fw-semibold text-white-50">Correo Electrónico</label>
            <div class="input-group">
              <span class="input-group-text form-control-dovi"><i class="bi bi-envelope text-white-50"></i></span>
              <input type="email" class="form-control form-control-dovi" id="email" placeholder="@gmail.com" required>
            </div>
          </div>

          <div class="mb-3">
            <div class="d-flex justify-content-between">
              <label for="password" class="form-label small fw-semibold text-white-50">Contraseña</label>
              <a href="#" class="text-orange text-decoration-none small">¿La olvidaste?</a>
            </div>
            <div class="input-group">
              <span class="input-group-text form-control-dovi"><i class="bi bi-lock text-white-50"></i></span>
              <input type="password" class="form-control form-control-dovi" id="password" placeholder="" required>
            </div>          </div>

         
          <div class="mb-4 form-check">
            <input type="checkbox" class="form-check-input pointer-click" id="rememberMe">
            <label class="form-check-label text-white-50 small pointer-click" for="rememberMe">Recordar mi sesión</label>
          </div>


          <button type="submit" class="btn btn-dovi w-100 py-2.5 fw-bold text-uppercase">Ingresar</button>
          
        </form>

        <div class="text-center mt-4">
          <p class="text-white-50 small mb-0">¿No tienes cuenta? <a href="#" class="text-orange text-decoration-none fw-semibold">Regístrate aquí</a></p>
        </div>

      </div>
    </div>
  </main>


  <footer class="text-center py-3 text-white-50 small">
    <p class="mb-0">&copy; 2026 DOVI S.A.S. Todos los derechos reservados.</p>
  </footer>

  <script src="public/assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>
</html>
