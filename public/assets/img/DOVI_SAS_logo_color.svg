<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="540" viewBox="0 0 800 540" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Fondos de íconos con colores vivos -->
    <radialGradient id="bgTransporte" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5DCAA5"/>
      <stop offset="100%" stop-color="#0F6E56"/>
    </radialGradient>
    <radialGradient id="bgAgricola" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#97C459"/>
      <stop offset="100%" stop-color="#3B6D11"/>
    </radialGradient>
    <radialGradient id="bgMaquinaria" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FAC775"/>
      <stop offset="100%" stop-color="#BA7517"/>
    </radialGradient>
    <radialGradient id="bgContratos" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#85B7EB"/>
      <stop offset="100%" stop-color="#185FA5"/>
    </radialGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FAC775" stop-opacity="1"/>
      <stop offset="60%" stop-color="#EF9F27" stop-opacity="1"/>
      <stop offset="100%" stop-color="#BA7517" stop-opacity="1"/>
    </radialGradient>
    <filter id="centerSombra">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#BA7517" flood-opacity="0.45"/>
    </filter>
    <filter id="sombra">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.18"/>
    </filter>
    <filter id="sombraTexto">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0F6E56" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Fondo transparente -->

  <!-- Círculo guía decorativo exterior -->
  <circle cx="400" cy="200" r="148" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="5,7" opacity="0.2"/>
  <!-- Anillo medio -->
  <circle cx="400" cy="200" r="96" fill="none" stroke="#BA7517" stroke-width="1" opacity="0.18"/>

  <!-- Líneas conectoras -->
  <line x1="304" y1="200" x2="496" y2="200" stroke="#BA7517" stroke-width="1.2" opacity="0.25"/>
  <line x1="400" y1="104" x2="400" y2="296" stroke="#BA7517" stroke-width="1.2" opacity="0.25"/>
  <line x1="332" y1="132" x2="468" y2="268" stroke="#1D9E75" stroke-width="0.8" opacity="0.15"/>
  <line x1="468" y1="132" x2="332" y2="268" stroke="#1D9E75" stroke-width="0.8" opacity="0.15"/>

  <!-- Punto central colorido -->
  <circle cx="400" cy="200" r="30" fill="#1D9E75" filter="url(#centerSombra)"/>
  <circle cx="400" cy="200" r="25" fill="#378ADD"/>
  <circle cx="400" cy="200" r="19" fill="url(#centerGlow)"/>
  <circle cx="400" cy="200" r="13" fill="#639922"/>
  <circle cx="400" cy="200" r="7" fill="white"/>
  <circle cx="400" cy="200" r="3.5" fill="#BA7517"/>

  <!-- ======================================================= -->
  <!-- ÍCONO 1: TRANSPORTE — arriba izquierda — VERDE ESMERALDA -->
  <!-- ======================================================= -->
  <g transform="translate(272, 116)" filter="url(#sombra)">
    <circle cx="0" cy="0" r="52" fill="url(#bgTransporte)"/>
    <circle cx="0" cy="0" r="50" fill="none" stroke="white" stroke-width="1.5" opacity="0.3"/>
    <!-- Cabina camión -->
    <rect x="-36" y="-22" width="26" height="24" rx="4" fill="white" opacity="0.95"/>
    <!-- Parabrisas -->
    <rect x="-32" y="-18" width="16" height="12" rx="2" fill="#9FE1CB"/>
    <!-- Carrocería -->
    <rect x="-10" y="-18" width="42" height="20" rx="3" fill="white" opacity="0.95"/>
    <!-- Líneas carrocería -->
    <line x1="-4" y1="-18" x2="-4" y2="2" stroke="#5DCAA5" stroke-width="1" opacity="0.5"/>
    <line x1="8"  y1="-18" x2="8"  y2="2" stroke="#5DCAA5" stroke-width="1" opacity="0.5"/>
    <line x1="20" y1="-18" x2="20" y2="2" stroke="#5DCAA5" stroke-width="1" opacity="0.5"/>
    <!-- Ruedas -->
    <circle cx="-22" cy="9"  r="9" fill="#085041"/>
    <circle cx="20"  cy="9"  r="9" fill="#085041"/>
    <circle cx="-22" cy="9"  r="4" fill="#9FE1CB"/>
    <circle cx="20"  cy="9"  r="4" fill="#9FE1CB"/>
    <!-- Faro -->
    <circle cx="-34" cy="-4" r="4" fill="#FAC775"/>
    <!-- Suelo -->
    <line x1="-40" y1="19" x2="36" y2="19" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <!-- Icono flecha movimiento -->
    <path d="M-42,-10 L-48,-6 L-42,-2" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  </g>
  <text x="272" y="186" text-anchor="middle"
    font-family="'Montserrat', Arial, sans-serif" font-weight="700" font-size="11.5" letter-spacing="2.5"
    fill="#0F6E56">TRANSPORTE</text>

  <!-- ======================================================= -->
  <!-- ÍCONO 2: AGRÍCOLA — arriba derecha — VERDE LIMA -->
  <!-- ======================================================= -->
  <g transform="translate(528, 116)" filter="url(#sombra)">
    <circle cx="0" cy="0" r="52" fill="url(#bgAgricola)"/>
    <circle cx="0" cy="0" r="50" fill="none" stroke="white" stroke-width="1.5" opacity="0.3"/>
    <!-- Hoja izquierda -->
    <path d="M0,20 C-32,-2 -38,-30 -14,-40 C-7,-43 0,-30 0,20 Z" fill="white" opacity="0.95"/>
    <!-- Venas izq -->
    <line x1="-6" y1="12" x2="-22" y2="-24" stroke="#3B6D11" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
    <line x1="-9" y1="-2" x2="-24" y2="-10" stroke="#3B6D11" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
    <!-- Hoja derecha -->
    <path d="M0,20 C32,-2 38,-30 14,-40 C7,-43 0,-30 0,20 Z" fill="#C0DD97" opacity="0.95"/>
    <!-- Venas der -->
    <line x1="6" y1="12" x2="22" y2="-24" stroke="#3B6D11" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
    <line x1="9" y1="-2" x2="24" y2="-10" stroke="#3B6D11" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
    <!-- Tallo -->
    <line x1="0" y1="20" x2="0" y2="36" stroke="#412402" stroke-width="3" stroke-linecap="round"/>
    <!-- Suelo -->
    <path d="M-18,36 Q0,28 18,36" stroke="#412402" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <!-- Sol pequeño -->
    <circle cx="26" cy="-32" r="8" fill="#FAC775"/>
    <line x1="26" y1="-44" x2="26" y2="-42" stroke="#FAC775" stroke-width="2" stroke-linecap="round"/>
    <line x1="26" y1="-22" x2="26" y2="-20" stroke="#FAC775" stroke-width="2" stroke-linecap="round"/>
    <line x1="14" y1="-32" x2="16" y2="-32" stroke="#FAC775" stroke-width="2" stroke-linecap="round"/>
    <line x1="36" y1="-32" x2="38" y2="-32" stroke="#FAC775" stroke-width="2" stroke-linecap="round"/>
  </g>
  <text x="528" y="186" text-anchor="middle"
    font-family="'Montserrat', Arial, sans-serif" font-weight="700" font-size="11.5" letter-spacing="2.5"
    fill="#3B6D11">AGRÍCOLA</text>

  <!-- ======================================================= -->
  <!-- ÍCONO 3: MAQUINARIA — abajo izquierda — DORADO/ÁMBAR -->
  <!-- ======================================================= -->
  <g transform="translate(272, 284)" filter="url(#sombra)">
    <circle cx="0" cy="0" r="52" fill="url(#bgMaquinaria)"/>
    <circle cx="0" cy="0" r="50" fill="none" stroke="white" stroke-width="1.5" opacity="0.3"/>
    <!-- Cuerpo excavadora -->
    <rect x="-32" y="-10" width="42" height="20" rx="4" fill="white" opacity="0.95"/>
    <!-- Cabina -->
    <rect x="-16" y="-26" width="22" height="18" rx="3" fill="white" opacity="0.95"/>
    <!-- Ventana -->
    <rect x="-12" y="-23" width="14" height="10" rx="2" fill="#FAC775"/>
    <!-- Brazo principal -->
    <line x1="10" y1="-18" x2="38" y2="-34" stroke="#412402" stroke-width="5" stroke-linecap="round"/>
    <!-- Brazo secundario -->
    <line x1="38" y1="-34" x2="44" y2="-12" stroke="#412402" stroke-width="4.5" stroke-linecap="round"/>
    <!-- Cuchara/balde -->
    <path d="M40,-12 L50,-9 L48,4 L37,1 Z" fill="#633806"/>
    <path d="M37,1 L50,4" stroke="#412402" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Oruga izquierda -->
    <rect x="-38" y="10" width="20" height="12" rx="6" fill="#412402"/>
    <circle cx="-33" cy="16" r="4" fill="#633806"/>
    <circle cx="-23" cy="16" r="4" fill="#633806"/>
    <!-- Oruga derecha -->
    <rect x="-6" y="10" width="22" height="12" rx="6" fill="#412402"/>
    <circle cx="-1"  cy="16" r="4" fill="#633806"/>
    <circle cx="11" cy="16" r="4" fill="#633806"/>
    <!-- Tubo de escape -->
    <rect x="-28" y="-34" width="6" height="12" rx="3" fill="#633806"/>
    <ellipse cx="-25" cy="-34" rx="5" ry="3" fill="#412402"/>
    <!-- Humo -->
    <path d="M-25,-36 C-22,-40 -28,-44 -24,-48" stroke="#BA7517" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  </g>
  <text x="272" y="354" text-anchor="middle"
    font-family="'Montserrat', Arial, sans-serif" font-weight="700" font-size="11.5" letter-spacing="2.5"
    fill="#633806">MAQUINARIA</text>

  <!-- ======================================================= -->
  <!-- ÍCONO 4: CONTRATOS — abajo derecha — AZUL -->
  <!-- ======================================================= -->
  <g transform="translate(528, 284)" filter="url(#sombra)">
    <circle cx="0" cy="0" r="52" fill="url(#bgContratos)"/>
    <circle cx="0" cy="0" r="50" fill="none" stroke="white" stroke-width="1.5" opacity="0.3"/>
    <!-- Sombra doc -->
    <rect x="-21" y="-33" width="40" height="52" rx="5" fill="#042C53" opacity="0.25" transform="translate(3,4)"/>
    <!-- Documento -->
    <rect x="-24" y="-35" width="40" height="52" rx="5" fill="white" opacity="0.95"/>
    <!-- Esquina doblada -->
    <path d="M8,-35 L16,-35 L16,-27 Z" fill="#B5D4F4"/>
    <path d="M8,-35 L8,-27 L16,-27" fill="none" stroke="#185FA5" stroke-width="1" opacity="0.4"/>
    <!-- Líneas contenido -->
    <line x1="-18" y1="-22" x2="4"  y2="-22" stroke="#185FA5" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="-18" y1="-13" x2="10" y2="-13" stroke="#378ADD" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>
    <line x1="-18" y1="-5"  x2="8"  y2="-5"  stroke="#378ADD" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>
    <line x1="-18" y1="3"   x2="6"  y2="3"   stroke="#378ADD" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>
    <!-- Firma con color dorado -->
    <path d="M-16,13 C-10,6 -5,18 1,12 C7,6 12,17 17,12" stroke="#BA7517" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Sello verde -->
    <circle cx="12" cy="2" r="11" fill="none" stroke="#1D9E75" stroke-width="2" opacity="0.7"/>
    <circle cx="12" cy="2" r="8"  fill="#1D9E75" opacity="0.2"/>
    <text x="12" y="6" text-anchor="middle" font-family="Arial" font-weight="800" font-size="8" fill="#0F6E56" opacity="0.9">✓</text>
  </g>
  <text x="528" y="354" text-anchor="middle"
    font-family="'Montserrat', Arial, sans-serif" font-weight="700" font-size="11.5" letter-spacing="2.5"
    fill="#185FA5">CONTRATOS</text>

  <!-- ======================================================= -->
  <!-- TIPOGRAFÍA DOVI SAS -->
  <!-- ======================================================= -->
  <text x="400" y="428" text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-weight="700" font-size="82" letter-spacing="20"
    fill="#0F6E56" filter="url(#sombraTexto)">DOVI</text>

  <!-- Línea dorada con ornamentos -->
  <line x1="230" y1="446" x2="570" y2="446" stroke="#BA7517" stroke-width="1.2" opacity="0.55"/>
  <circle cx="230" cy="446" r="3.5" fill="#BA7517" opacity="0.6"/>
  <circle cx="570" cy="446" r="3.5" fill="#BA7517" opacity="0.6"/>
  <circle cx="400" cy="446" r="3" fill="#BA7517" opacity="0.5"/>

  <!-- SAS -->
  <text x="400" y="472" text-anchor="middle"
    font-family="'Montserrat', Arial, sans-serif"
    font-weight="300" font-size="16" letter-spacing="12"
    fill="#BA7517">S A S</text>

  <!-- Tagline -->
  <text x="400" y="508" text-anchor="middle"
    font-family="'Montserrat', Arial, sans-serif"
    font-weight="400" font-size="11.5" letter-spacing="4"
    fill="#3B6D11" opacity="0.8">SERVICIOS AGRÍCOLAS INTEGRALES</text>
</svg>
